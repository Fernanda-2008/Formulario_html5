<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario completo</title>
  <!-- Conexión al archivo CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <section class="demo-form-card">
    <h3>Formulario completo</h3>
    <p>Completa los campos y presiona el botón.</p>

    <form>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Escribe tu nombre">

      <label for="edad">Edad:</label>
      <input type="number" id="edad" placeholder="Escribe tu edad">

      <label for="correo">Correo:</label>
      <input type="email" id="correo" placeholder="Escribe tu correo">

      <label for="grupo">Grupo:</label>
      <input type="text" id="grupo" placeholder="Escribe tu grupo">

      <label for="telefono">Teléfono:</label>
      <input type="tel" id="telefono" placeholder="Escribe tu teléfono">

      <label for="comentario">Comentario:</label>
      <textarea id="comentario" placeholder="Escribe un comentario"></textarea>

      <button type="button" onclick="mostrarDatos()">Mostrar datos</button>
    </form>

    <div id="resultado" class="resultado">
      Aquí aparecerá la información capturada.
    </div>
  </section>

  <!-- Conexión al archivo JS -->
  <script src="js/app.js"></script>
</body>
</html>
